# MongoDB connection
# Uses environment variable MONGODB_URI if available, otherwise falls back to a local server
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/wedding}


# JWT secret and expiration
jwt.secret=change-me
jwt.expiration=3600000

# Cloudinary configuration (set via env or properties)
cloudinary.cloud_name=your_cloud_name
cloudinary.api_key=your_api_key
cloudinary.api_secret=your_api_secret
