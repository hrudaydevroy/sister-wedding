<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery Viewer</title>
  <style>
    body{font-family:Segoe UI, sans-serif;margin:20px;background:#fafafa}
    .tabs{display:flex;gap:10px;margin-bottom:20px}
    .tabs button{flex:1;padding:10px;border:none;cursor:pointer;background:#eee;border-radius:6px}
    .tabs button.active{background:#ff2f6d;color:#fff}
    .gallery{display:flex;flex-wrap:wrap;gap:15px}
    .card{width:200px;text-align:center}
    .card img, .card video{max-width:100%;border-radius:6px}
  </style>
</head>
<body>
  <h2>All Media</h2>
  <div class="tabs">
    <button id="photosBtn" class="active">Photos</button>
    <button id="videosBtn">Videos</button>
  </div>
  <div id="mediaContainer" class="gallery"></div>
  <script>
    const photosBtn=document.getElementById('photosBtn');
    const videosBtn=document.getElementById('videosBtn');
    const container=document.getElementById('mediaContainer');
    let current='image';
    photosBtn.addEventListener('click',()=>{current='image';photosBtn.classList.add('active');videosBtn.classList.remove('active');load();});
    videosBtn.addEventListener('click',()=>{current='video';videosBtn.classList.add('active');photosBtn.classList.remove('active');load();});
    async function load(){
      const res=await fetch('http://localhost:8080/api/gallery');
      const items=await res.json();
      container.innerHTML='';
      items.filter(i=>i.type===current).forEach(i=>{
        const div=document.createElement('div');div.className='card';
        const title=document.createElement('div');title.textContent=i.title;
        if(current==='image'){
          const img=document.createElement('img');img.src=i.mediaUrl;div.appendChild(img);
        } else {
          const vid=document.createElement('video');vid.src=i.mediaUrl;vid.controls=true;div.appendChild(vid);
        }
        div.appendChild(title);
        container.appendChild(div);
      });
    }
    load();
  </script>
</body>
</html>
